name: Build and publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ---------------------------------------------------------------------------
  # Build binary wheels for each OS via cibuildwheel
  # ---------------------------------------------------------------------------
  build-wheels:
    name: Wheels · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-13, macos-15]
        # macos-13  → x86_64 runner
        # macos-15  → arm64 runner (Apple Silicon)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # setuptools-scm needs full history to read tags

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        # Configuration is read from [tool.cibuildwheel] in pyproject.toml

      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # Build source distribution (sdist)
  # ---------------------------------------------------------------------------
  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # setuptools-scm needs full history to read tags

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build frontend
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # Publish all artifacts to PyPI using Trusted Publishing (no token needed)
  # Requires a PyPI publisher configured at:
  #   https://pypi.org/manage/project/rankfmc/settings/publishing/
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/rankfmc/
    permissions:
      id-token: write   # required for OIDC Trusted Publishing

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
